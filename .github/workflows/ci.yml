name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Syntax check all modules
        run: |
          for f in src/*.mjs test/*.mjs; do node --check "$f"; done

      - name: Unit tests (threat engine)
        run: npm test

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -t hurricane-ready:ci .

      - name: Boot in replay mode and verify the threat ladder
        run: |
          docker run -d --name hr \
            -e REPLAY=1 -e DISABLE_AI=1 -e REPLAY_INTERVAL_SECONDS=1 \
            -p 8080:8080 hurricane-ready:ci

          # healthcheck comes up
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080/healthz && break
            sleep 1
          done
          curl -sf http://localhost:8080/healthz

          # Replay must reach IMMINENT and return to ALL_CLEAR. A fixed sleep
          # is brittle — startup lag + runner-speed variance means the replay
          # may be parked on frame 10 or still mid-cycle at any given moment.
          # Poll until both conditions hold, or give up after 40s.
          STATUS=""
          for i in $(seq 1 40); do
            STATUS=$(curl -sf http://localhost:8080/api/status) || true
            HAS_IMM=$(echo "$STATUS" | jq -r '.history | map(.to) | index("IMMINENT") != null' 2>/dev/null || echo false)
            LEVEL=$(echo "$STATUS" | jq -r '.level' 2>/dev/null || echo "")
            if [ "$HAS_IMM" = "true" ] && [ "$LEVEL" = "ALL_CLEAR" ]; then
              echo "Replay completed: ladder reached IMMINENT and returned to ALL_CLEAR (t=${i}s)"
              break
            fi
            sleep 1
          done
          echo "$STATUS" | jq -e '.history | map(.to) | index("IMMINENT") != null' \
            || (echo "Replay never reached IMMINENT"; echo "$STATUS" | jq .history; exit 1)
          echo "$STATUS" | jq -e '.level == "ALL_CLEAR"' \
            || (echo "Replay did not return to ALL_CLEAR (final level=$LEVEL)"; exit 1)

          # dashboard serves
          curl -sf http://localhost:8080/ | grep -q "Hurricane-Ready"

      - name: Container logs (on failure)
        if: failure()
        run: docker logs hr

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -t hurricane-ready:scan .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hurricane-ready:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
