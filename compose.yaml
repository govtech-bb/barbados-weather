services:
  hurricane-ready:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      # --- Island (defaults: Barbados) ---
      ISLAND_NAME: ${ISLAND_NAME:-Barbados}
      ISLAND_LAT: ${ISLAND_LAT:-13.19}
      ISLAND_LON: ${ISLAND_LON:--59.54}

      # --- Mode ---
      # REPLAY=1 replays Hurricane Beryl (2024) for demos
      REPLAY: ${REPLAY:-0}
      POLL_MINUTES: ${POLL_MINUTES:-15}

      # --- AI briefings (optional; template fallback without) ---
      AWS_REGION: ${AWS_REGION:-us-east-1}
      MODEL_ID: ${MODEL_ID:-us.anthropic.claude-haiku-4-5-20251001-v1:0}
      DISABLE_AI: ${DISABLE_AI:-0}

      # --- AWS credentials (#31). Pass scoped, short-lived creds via env
      # instead of mounting ~/.aws — which exposed every SSO cache + every
      # profile (including production accounts) to the container.
      # Recommended local flow:
      #   eval "$(aws sso login --sso-session personal --no-browser=false; \
      #     aws configure export-credentials --profile personal-eportfolio-prod \
      #       --format env)"
      #   docker compose up
      # `aws configure export-credentials --format env` emits the three
      # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN
      # exports that the AWS SDK reads automatically. Tokens are typically
      # 1–8h scoped, so the container loses access when they expire — much
      # narrower blast radius than mounting the full ~/.aws.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}

      # --- Web Push (optional; "Get storm alerts" opt-in) ---
      # Generate once: npx web-push generate-vapid-keys  (put in .env)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:alerts@hurricane-ready.local}

      # --- Alert channels (all optional) ---
      # SENDER_EMAIL must be SES-verified; ALERT_PHONES in E.164 (+1246...)
      ALERT_EMAILS: ${ALERT_EMAILS:-}
      SENDER_EMAIL: ${SENDER_EMAIL:-}
      ALERT_PHONES: ${ALERT_PHONES:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    volumes:
      - hurricane-state:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  hurricane-state:
