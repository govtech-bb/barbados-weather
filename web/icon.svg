<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Bim Weather">
  <rect width="100" height="100" rx="24" fill="#0b2e6e"/>
  <!-- sun rays (upper hemisphere) -->
  <g stroke="#ffc726" stroke-width="4.5" stroke-linecap="round">
    <line x1="32" y1="58" x2="24" y2="58"/>
    <line x1="34.4" y1="49" x2="27.5" y2="45"/>
    <line x1="41" y1="42.4" x2="37" y2="35.5"/>
    <line x1="50" y1="40" x2="50" y2="32"/>
    <line x1="59" y1="42.4" x2="63" y2="35.5"/>
    <line x1="65.6" y1="49" x2="72.5" y2="45"/>
    <line x1="68" y1="58" x2="76" y2="58"/>
  </g>
  <!-- sun rising over the horizon -->
  <path d="M35 58 a15 15 0 0 1 30 0 z" fill="#ffc726"/>
  <!-- horizon / sea surface (sun sits on it) -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round">
    <line x1="14" y1="58" x2="31" y2="58"/>
    <line x1="69" y1="58" x2="86" y2="58"/>
  </g>
  <!-- sea wave -->
  <path d="M16 76 q9 -8 18 0 t18 0 t18 0 t18 0" fill="none" stroke="#7fd6ea" stroke-width="5" stroke-linecap="round"/>
</svg>
